{% extends 'base.html' %}
{% load static %}

{% block title %}Sign In — MediPredict AI{% endblock %}

{% block content %}
<section style="padding: 5rem 5% 6rem; max-width: 460px; margin: 0 auto;">
    <div class="glass-card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <i class="fa-solid fa-user-shield" style="font-size: 3rem; color: var(--primary-light); margin-bottom: 1rem;"></i>
            <h2 class="text-gradient">Sign In</h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.25rem;">Log in to access your personal dashboard.</p>
        </div>

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label" for="id_username">Username</label>
                <input type="text" name="username" autofocus required id="id_username" class="form-control" placeholder="Enter username">
            </div>
            
            <div class="form-group" style="margin-bottom: 1rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <label class="form-label" for="id_password" style="margin-bottom: 0;">Password</label>
                    <a href="{% url 'password_reset' %}" style="font-size: 0.8rem; font-weight: 500;">Forgot password?</a>
                </div>
                <input type="password" name="password" required id="id_password" class="form-control" placeholder="Enter password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">
                <i class="fa-solid fa-right-to-bracket"></i> Login
            </button>
        </form>

        <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
            <span>Don't have an account? </span>
            <a href="{% url 'register' %}" style="font-weight: 600;">Sign Up</a>
        </div>
    </div>
</section>
{% endblock %}
