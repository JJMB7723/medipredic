{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset Complete — MediPredict AI{% endblock %}

{% block content %}
<section style="padding: 5rem 5% 6rem; max-width: 480px; margin: 0 auto;">
    <div class="glass-card" style="text-align: center;">
        <i class="fa-solid fa-circle-check" style="font-size: 3.5rem; color: var(--success); margin-bottom: 1.5rem; animation: pulse 2.5s infinite;"></i>
        <h2 class="text-gradient" style="margin-bottom: 0.75rem;">Password Changed</h2>
        <p style="color: var(--text-secondary); font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem;">
            Your password has been successfully updated. You may now log in using your new credentials.
        </p>
        <a href="{% url 'login' %}" class="btn btn-primary" style="width: 100%;">
            <i class="fa-solid fa-right-to-bracket"></i> Sign In
        </a>
    </div>
</section>
{% endblock %}
